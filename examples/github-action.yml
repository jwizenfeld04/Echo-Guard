# Example: Add this to .github/workflows/echo-guard.yml in your repo
#
# This runs Echo Guard on every pull request, posting inline annotations
# on functions that duplicate existing code in the codebase.

name: Echo Guard

on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Echo Guard
        uses: jwizenfeld04/Echo-Guard@main
        with:
          threshold: "0.50"
          fail-on: "high"  # "high", "medium", "low", or "none"
